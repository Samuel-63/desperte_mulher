name: desperte_mulher_v2
description: Plataforma de Análise de Risco — versão 2 com novo layout e múltipla escolha.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navegação
  go_router: ^13.0.0

  # Gerenciamento de estado
  flutter_riverpod: ^2.5.1

  # HTTP / Backend
  dio: ^5.4.0

  # Armazenamento local
  shared_preferences: ^2.2.2

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Utilitários
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.1.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
